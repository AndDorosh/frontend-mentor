<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/style.css" />

    <title>Profile card component</title>
  </head>
  <body>
    <h1 class="visually-hidden">Profile card</h1>

    <div class="profile-card">
      <img
        class="profile-card__image"
        src="./assets/bg-pattern-card.svg"
        alt="bubbles"
      />
      <img
        class="profile-card__avatar"
        src="./assets/image-victor.jpg"
        alt="Victor"
      />
      <div class="profile-card__personal-info-wrap">
        <h2 class="profile-card__name">Victor Crest</h2>
        <span class="profile-card__age">26</span>
      </div>
      <span class="profile-card__city">London</span>
      <div class="profile-card__social-media">
        <div class="profile-card__social-media-wrap">
          <span class="profile-card__social-media-counter"> 80К </span>
          <span class="profile-card__social-media-label"> Followers </span>
        </div>
        <div class="profile-card__social-media-wrap">
          <span class="profile-card__social-media-counter"> 803К </span>
          <span class="profile-card__social-media-label"> Likes </span>
        </div>
        <div class="profile-card__social-media-wrap">
          <span class="profile-card__social-media-counter"> 1.4К </span>
          <span class="profile-card__social-media-label"> Photos </span>
        </div>
      </div>
    </div>
  </body>
</html>
